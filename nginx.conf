server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Health check for Zeabur
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
